<!DOCTYPE html>
<html>
<head>
    <title>Cognition-Aware ABSA</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #f8fafc);
        }

        /* NAVBAR */
        .navbar {
            background: #1e293b;
            padding: 15px 40px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .nav-links a {
            color: #cbd5f5;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* CONTAINER */
        .container {
            padding: 40px;
        }

        /* CARDS */
        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0px 6px 18px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        /* COLORS */
        .bg-success { background: linear-gradient(135deg, #22c55e, #16a34a) !important; }
        .bg-warning { background: linear-gradient(135deg, #facc15, #eab308) !important; color: #000 !important; }
        .bg-danger  { background: linear-gradient(135deg, #ef4444, #dc2626) !important; }

        /* TABLE */
        table {
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #1e293b !important;
            color: white !important;
        }

        /* HEADINGS */
        h1, h2, h3 {
            font-weight: 600;
        }

        /* BUTTONS */
        .btn {
            border-radius: 8px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">Cognition-Aware ABSA</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/admin">Dashboard</a>
        <a href="/demo">Demo</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
